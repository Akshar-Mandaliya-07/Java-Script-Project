<!DOCTYPE html>
<html lang="en">

<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>BMI Calculator</title>

          <style>
                    body {
                              background-color: #212121;
                              display: flex;
                              justify-content: center;
                              align-items: center;
                              height: 100vh;
                              margin: 0;
                    }

                    form {
                              background-color: #333;
                              padding: 25px;
                              border-radius: 10px;
                              width: 300px;
                    }

                    .label {
                              font-size: 20px;
                              color: white;
                              font-family: 'Times New Roman', Times, serif;
                    }

                    .text-box {
                              width: 290px;
                              height: 25px;
                              font-size: 16px;
                              margin-top: 5px;
                              margin-bottom: 20px;
                    }

                    .button {
                              width: 100%;
                              font-size: 20px;
                              padding: 8px;
                              cursor: pointer;
                    }

                    #result {
                              color: white;
                              text-align: center;
                              margin-top: 20px;
                              font-size: 22px;
                    }
          </style>
</head>

<body>

          <form>
                    <label class="label">Enter Height :- </label><br>
                    <input type="number" id="height" placeholder="Enter Height" class="text-box"><br>

                    <label class="label">Enter Weight :- </label><br>
                    <input type="number" id="weight" placeholder="Enter Weight" class="text-box"><br>

                    <button class="button" id="btn">Submit</button>

                    <h2 id="result">BMI Is :- </h2>       
          </form>
          
          <script src="script.js"></script>

</body>

</html>
