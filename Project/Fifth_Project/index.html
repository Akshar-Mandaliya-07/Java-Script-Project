<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Age Calculator</title>
          <style>
                    .background{
                              background-color: #212121;
                              color: white;
                    }
                    .text-box{
                              margin-top: 30px;
                              font-size: 20px;
                    }
                    .button{
                              margin-top: 30px;
                              font-size: 20px;
                              font-family: 'Times New Roman', Times, serif;
                    }
          </style>
</head>
<body class="background">
          Enter Birth Date :- <input type="date" id="birth" style="margin-top: 10px;font-size: 20px;" required><br>
          Enter Current Date :- <input type="date" id="current" class="text-box" required><br>
          <button class="button" id="btn">Click</button>

          <h2 id="result"></h2>
</body>
<script src="script.js"></script>
</html>
