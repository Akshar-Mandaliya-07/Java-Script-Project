<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Color Changer Button to Background</title>
          <style>
                    .add{
                              margin-top: 40px;
                              margin-left: 30px;
                    }
          </style>
</head>
<body>
          <div class="parent" id="parent">
                    <button style="font-size: 30px;" class="add" id="red">RED</button>
                    <button style="font-size: 30px;" class="add" id="blue">BLUE</button>
                    <button style="font-size: 30px;" class="add" id="yellow">YELLOW</button>
                    <button style="font-size: 30px;padding: 3px;" class="add" id="green">GREEN</button>
          </div>
</body>
<script src="script.js"></script>
</html>
